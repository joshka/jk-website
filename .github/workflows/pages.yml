name: Pages

on:
  pull_request:
    paths:
      - ".github/workflows/pages.yml"
      - "astro.config.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - "public/**"
      - "src/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/pages.yml"
      - "astro.config.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - "public/**"
      - "src/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          lfs: true
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@9e251bfaa0b777228ae457b7bb279c1f2a6c7c6 # v4.1.0
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.12.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build

      - name: Check generated media
        run: |
          set -euo pipefail
          file dist/assets/jk-log.gif | grep -F "GIF image data"
          file dist/assets/jk-diff.gif | grep -F "GIF image data"
          file dist/assets/jk-log.png | grep -F "PNG image data"
          file dist/assets/jk-diff.png | grep -F "PNG image data"
          ! grep -R "version https://git-lfs.github.com/spec" dist/assets

      - name: Upload Pages artifact
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

  deploy:
    name: Deploy site
    needs: build
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
